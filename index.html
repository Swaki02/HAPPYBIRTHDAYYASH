<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Yashraj</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#ff4e50,#f9d423,#24c6dc,#e94057);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Confetti */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* MAIN BOX */
.card{
  position:relative;
  width:95%;
  max-width:750px;
  padding:60px 40px;
  text-align:center;
  background:white;
  border-radius:25px;
  border:6px solid black;
  box-shadow:0 30px 60px rgba(0,0,0,0.5);
  z-index:2;
}

h1{
  font-family:'Luckiest Guy',cursive;
  font-size:48px;
  color:#ff006e;
  margin-bottom:30px;
  letter-spacing:2px;
}

.note{
  font-size:20px;
  font-style:italic;
  margin-bottom:40px;
  color:#333;
}

/* Secret Section */
.secret-section p{
  font-weight:600;
  margin-bottom:10px;
}

.secret-section input{
  padding:10px;
  border-radius:8px;
  border:2px solid black;
  width:70%;
  max-width:300px;
}

.secret-section button{
  margin-top:15px;
  padding:10px 20px;
  border-radius:8px;
  border:2px solid black;
  background:#ffbe0b;
  font-weight:600;
  cursor:pointer;
}

#errorMsg{
  color:red;
  margin-top:15px;
  font-weight:600;
}

/* BALLOON REVEAL */
.reveal{
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-end;
  z-index:5;
}

.balloon{
  width:60px;
  height:80px;
  border-radius:50%;
  margin:10px;
  position:relative;
  animation:rise 4s ease forwards;
}

.balloon::after{
  content:'';
  position:absolute;
  width:2px;
  height:50px;
  background:black;
  top:80px;
  left:50%;
}

@keyframes rise{
  to{transform:translateY(-120vh);}
}

/* Responsive */
@media(max-width:768px){
  h1{font-size:32px;}
  .note{font-size:16px;}
  .card{padding:40px 20px;}
}

</style>
</head>

<body>

<div class="reveal" id="reveal"></div>
<canvas id="confetti"></canvas>

<div class="card">
  <h1>HAPPY BIRTHDAY YASH!</h1>

  <div class="note">
  🎂 [ 03/03/2026 ˃ᴗ˂ ] Happy birthdayyyyy! Wishing you a fantastic birthday and an amazing year ahead (with lots of chilli chicken rolls, french fries and masti) 🎂

  </div>

  <div class="secret-section">
    <p>🧸 To continue, enter the secret code pookie 🧸:</p>
    <input id="secretInput" type="password" placeholder="Enter secret code">
    <br>
    <button onclick="checkCode()">Enter</button>
    <p id="errorMsg"></p>
  </div>

</div>

<script>
/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];
for(let i=0;i<200;i++){
  confetti.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    w:Math.random()*5+3,
    h:Math.random()*25+10,
    speed:Math.random()*3+1,
    color:`hsl(${Math.random()*360},100%,60%)`,
    angle:Math.random()*360
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confetti.forEach(c=>{
    ctx.save();
    ctx.translate(c.x,c.y);
    ctx.rotate(c.angle*Math.PI/180);
    ctx.fillStyle=c.color;
    ctx.fillRect(0,0,c.w,c.h);
    ctx.restore();
    c.y+=c.speed;
    c.angle+=1;
    if(c.y>canvas.height){
      c.y=0;
      c.x=Math.random()*canvas.width;
    }
  });
}
setInterval(draw,20);

/* BALLOONS */
const reveal=document.getElementById("reveal");
const colors=["#ff006e","#ffbe0b","#3a86ff","#fb5607","#8338ec","#06d6a0"];

for(let i=0;i<80;i++){
  let b=document.createElement("div");
  b.className="balloon";
  b.style.background=colors[Math.floor(Math.random()*colors.length)];
  b.style.animationDuration=(3+Math.random()*2)+"s";
  reveal.appendChild(b);
}

setTimeout(()=>{
  reveal.style.display="none";
},4500);

/* SECRET CODE */
function checkCode(){
  const correctCode="BUDDAYBOY17";   // 🔐 CHANGE THIS
  const userInput=document.getElementById("secretInput").value;

  if(userInput===correctCode){
    window.location.href="https://swaki02.github.io/SECRET/secret.html";
  } else {
    document.getElementById("errorMsg").innerText=
    "THIS EXCLUSIVE CONTENT IS ONLY FOR THE BIRTHDAY BOY (PLS GO AWAY 😡)";
  }
}


</script>

</body>

</html>
